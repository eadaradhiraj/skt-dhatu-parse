requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "skt-dhatu-parse"
version = "0.1.0"
description = "A Paninian Sanskrit Derivation Engine"
readme = "README.md"
requires-python = ">=3.9"
authors =[
    { name = "Dhiraj Eadara", email = "eadaradhiraj@gmail.com" }
]
classifiers =[
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
    "Operating System :: OS Independent",
]

# This tells pip to include your .tsv and .db files when someone installs it![tool.setuptools.package-data]
skt_dhatu_parse = ["data/*.tsv", "data/*.db"]

# THIS IS THE MAGIC FOR THE CLI:
# Once installed, the user can type `skt-derive` anywhere in their terminal,
# and it will run the `main()` function inside your `cli.py` file!
[project.scripts]
skt-derive = "skt_dhatu_parse.cli:main"